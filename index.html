  // Small forgiving aliases for free-text typing.
  const ALIAS = {
    'scallion':'green onion','scallions':'green onion','green onions':'green onion',
    'coriander':'cilantro','garbanzo':'chickpeas','garbanzos':'chickpeas','chickpea':'chickpeas',
    'tomatoes':'tomato','potatoes':'potato','mushrooms':'mushroom','carrots':'carrot'
  };

  // Flat lookup of every selectable chip by key (for click delegation).
  const itemByKey = {};
  GROUPS.forEach(function(g){ g.items.forEach(function(it){ itemByKey[it.key]=it; }); });
  SUGG.forEach(function(it){ if(!itemByKey[it.key]) itemByKey[it.key]=it; });

  /* ============================= STATE ============================= */
  const state = { lang:'en', selected:[], freeText:'', status:'idle', recipes:[] };

  /* ============================ HELPERS =========================== */
  function esc(s){
    return String(s==null?'':s).replace(/[&<>"']/g,function(c){
      return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
    });
  }
  function norm(s){
    var v = String(s==null?'':s).toLowerCase().trim();
    return ALIAS[v] || v;
  }
  function isSel(key){ return state.selected.some(function(s){ return s.key===key; }); }
  function label(obj){ return obj[state.lang] || obj.en; }

  /* =========================== MATCHING =========================== */
  function pantryTokens(){
    var set = {};
    state.selected.forEach(function(p){
      set[norm(p.en)] = true;
      if(p.es) set[norm(p.es)] = true;
    });
    return set;
  }
  function matchRecipes(){
    var have = pantryTokens();
    var scored = [];
    RECIPES.forEach(function(r){
      var haveCore = [], missCore = [];
      r.core.forEach(function(c){
        if(have[norm(c.en)] || have[norm(c.es)]) haveCore.push(c);
        else missCore.push(c);
      });
      // Surface only realistic matches: at least one core ingredient on
      // hand, and no more than two missing.
      if(haveCore.length >= 1 && missCore.length <= 2){
        scored.push({ r:r, have:haveCore, miss:missCore });
      }
    });
    scored.sort(function(a,b){
      return (a.miss.length - b.miss.length)        // fewest missing first
        || (b.have.length - a.have.length)          // then most overlap
        || (a.r.t - b.r.t);                         // then quickest
    });
    return scored.slice(0, 12);
  }

  /* =========================== MUTATIONS ========================== */
  function setLang(l){ state.lang=l; render(); }
  function toggle(it){
    if(isSel(it.key)) state.selected=state.selected.filter(function(x){return x.key!==it.key;});
    else state.selected=state.selected.concat([{key:it.key,en:it.en,es:it.es}]);
    render();
  }
  function addItem(it){
    if(!isSel(it.key)){ state.selected=state.selected.concat([{key:it.key,en:it.en,es:it.es}]); render(); }
  }
  function addFree(){
    var inp=document.getElementById('freetext');
    var txt=((inp&&inp.value)||state.freeText||'').trim();
    if(!txt) return;
    var key='ft:'+txt.toLowerCase();
    if(!isSel(key)) state.selected=state.selected.concat([{key:key,en:txt,es:txt}]);
    state.freeText='';
    render();
    var again=document.getElementById('freetext'); if(again) again.focus();
  }
  function remove(key){ state.selected=state.selected.filter(function(x){return x.key!==key;}); render(); }
  function clearAll(){ state.selected=[]; render(); }
  function reset(){ state.status='idle'; state.recipes=[]; render(); }
  function find(){
    if(!state.selected.length) return;
    state.status='loading'; render();
    setTimeout(function(){
      state.recipes = matchRecipes();
      state.status='results'; render();
    }, 320);
  }

  /* ============================ STYLES ============================ */
  var SEG = "padding:7px 15px;border:none;background:transparent;color:#8c8579;font-family:'Hanken Grotesk',sans-serif;font-weight:700;font-size:13px;cursor:pointer;border-radius:999px;letter-spacing:.05em;transition:all .15s;";
  var SEG_ON = SEG + "background:#1b1917;color:#f4f1ea;";
  var CHIP = "padding:9px 15px;border:1px solid #e4ded2;background:#fffdf9;border-radius:999px;font-family:'Hanken Grotesk',system-ui,sans-serif;font-weight:500;font-size:14px;color:#1b1917;cursor:pointer;line-height:1;white-space:nowrap;transition:all .15s ease;";
  var CHIP_SEL = "padding:9px 15px;border:1px solid #1b1917;background:#1b1917;border-radius:999px;font-family:'Hanken Grotesk',system-ui,sans-serif;font-weight:500;font-size:14px;color:#f4f1ea;cursor:pointer;line-height:1;white-space:nowrap;transition:all .15s ease;";
  function findBtnStyle(){
    var can = state.selected.length>0;
    var base = "display:inline-flex;align-items:center;justify-content:center;gap:10px;padding:15px 28px;border-radius:999px;border:none;font-family:'Hanken Grotesk',sans-serif;font-weight:600;font-size:16px;cursor:"+(can?'pointer':'not-allowed')+";transition:all .15s;box-shadow:"+(can?'0 6px 20px rgba(185,28,28,.22)':'none')+";";
    return base + (can ? "background:#b91c1c;color:#fff;" : "background:#e7e1d6;color:#a29b8e;");
  }

  /* =========================== VIEWS ============================== */
  function topBar(isEn){
    return '<div class="topbar" style="display:flex;align-items:center;justify-content:space-between;padding:20px 28px;border-bottom:1px solid #e4ded2;position:sticky;top:0;background:rgba(244,241,234,.86);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);z-index:5;">' +
      '<div style="display:flex;align-items:center;gap:11px;">' +
        '<span style="width:15px;height:15px;background:#b91c1c;border-radius:3px;display:inline-block;"></span>' +
        '<span style="font-family:\'Newsreader\',serif;font-size:19px;font-weight:600;letter-spacing:-.01em;">Pantry&nbsp;&rarr;&nbsp;Recipes</span>' +
      '</div>' +
      '<div style="display:flex;gap:2px;background:#fffdf9;border:1px solid #e4ded2;border-radius:999px;padding:3px;">' +
        '<button type="button" data-act="lang" data-lang="en" style="'+(isEn?SEG_ON:SEG)+'">EN</button>' +
        '<button type="button" data-act="lang" data-lang="es" style="'+(isEn?SEG:SEG_ON)+'">ES</button>' +
      '</div>' +
    '</div>';
  }

  function pantryTray(t){
    var chips = state.selected.map(function(s){
      return '<span style="display:inline-flex;align-items:center;gap:7px;background:#1b1917;color:#f4f1ea;padding:7px 9px 7px 13px;border-radius:999px;font-size:13.5px;font-weight:500;">'+
        esc(label(s))+
        '<button type="button" data-act="remove" data-key="'+esc(s.key)+'" aria-label="remove" style="background:rgba(244,241,234,.18);border:none;color:#f4f1ea;width:18px;height:18px;border-radius:50%;cursor:pointer;font-size:13px;line-height:1;display:flex;align-items:center;justify-content:center;">&times;</button>'+
      '</span>';
    }).join('');
    return '<div style="background:#fffdf9;border:1px solid #e4ded2;border-radius:16px;padding:18px 20px;margin-bottom:22px;">'+
      '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:13px;">'+
        '<div style="font-family:\'Newsreader\',serif;font-size:16px;font-weight:600;">'+esc(t.yourPantry)+' <span style="color:#b91c1c;">&middot; '+state.selected.length+'</span></div>'+
        '<button type="button" data-act="clear" style="background:none;border:none;color:#8c8579;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;text-decoration:underline;text-underline-offset:3px;">'+esc(t.clear)+'</button>'+
      '</div>'+
      '<div style="display:flex;flex-wrap:wrap;gap:8px;">'+chips+'</div>'+
    '</div>';
  }

  function categories(){
    return GROUPS.map(function(g){
      var chips = g.items.map(function(it){
        var sel = isSel(it.key);
        return '<button type="button" class="chip'+(sel?' sel':'')+'" data-act="toggle" data-key="'+esc(it.key)+'" style="'+(sel?CHIP_SEL:CHIP)+'">'+esc(it[state.lang])+'</button>';
      }).join('');
      return '<div>'+
        '<div style="font-family:\'Newsreader\',serif;font-size:15px;font-weight:600;margin-bottom:13px;display:flex;align-items:center;gap:9px;">'+
          '<span style="width:6px;height:6px;background:#b91c1c;border-radius:50%;display:inline-block;"></span>'+esc(g.label[state.lang])+
        '</div>'+
        '<div style="display:flex;flex-wrap:wrap;gap:9px;">'+chips+'</div>'+
      '</div>';
    }).join('');
  }

  function idleView(t){
    var has = state.selected.length>0;
    var findText = has ? t.find : t.findEmpty;
    return '<div style="max-width:740px;margin:0 auto;padding-top:48px;">'+
      '<div style="font-size:12px;font-weight:700;letter-spacing:.18em;color:#b91c1c;margin-bottom:14px;">'+esc(t.kicker)+'</div>'+
      '<h1 class="hero-h1" style="font-family:\'Newsreader\',serif;font-weight:500;font-size:52px;line-height:1.04;letter-spacing:-.02em;margin:0 0 16px;text-wrap:balance;">'+esc(t.headline)+'</h1>'+
      '<p style="font-size:17px;line-height:1.5;color:#6e685d;max-width:540px;margin:0 0 36px;">'+esc(t.sub)+'</p>'+
      (has ? pantryTray(t) : '<p style="font-size:13.5px;line-height:1.5;color:#a29b8e;margin:0 0 22px;">'+esc(t.emptyPantry)+'</p>')+
      '<div style="display:flex;gap:9px;margin-bottom:34px;">'+
        '<input id="freetext" value="'+esc(state.freeText)+'" placeholder="'+esc(t.freePlaceholder)+'" autocomplete="off" style="flex:1;min-width:0;padding:13px 16px;border:1px solid #e4ded2;border-radius:12px;background:#fffdf9;font-family:inherit;font-size:15px;color:#1b1917;outline:none;">'+
        '<button type="button" data-act="addfree" style="padding:13px 22px;border:none;background:#1b1917;color:#f4f1ea;border-radius:12px;font-family:inherit;font-weight:600;font-size:15px;cursor:pointer;white-space:nowrap;">'+esc(t.add)+'</button>'+
      '</div>'+
      '<div style="display:flex;flex-direction:column;gap:28px;">'+categories()+'</div>'+
      '<div style="position:sticky;bottom:0;padding:22px 0 8px;margin-top:36px;background:linear-gradient(to top,#f4f1ea 62%,rgba(244,241,234,0));">'+
        '<button type="button" data-act="find" style="'+findBtnStyle()+'">'+esc(findText)+'<span style="font-size:18px;">&rarr;</span></button>'+
      '</div>'+
    '</div>';
  }

  function loadingView(t){
    return '<div style="max-width:740px;margin:0 auto;padding-top:140px;display:flex;flex-direction:column;align-items:center;text-align:center;">'+
      '<div style="width:38px;height:38px;border:3px solid #e4ded2;border-top-color:#b91c1c;border-radius:50%;animation:spin .8s linear infinite;margin-bottom:26px;"></div>'+
      '<div style="font-family:\'Newsreader\',serif;font-size:24px;font-weight:500;margin-bottom:8px;">'+esc(t.loading)+'</div>'+
      '<div style="font-size:15px;color:#8c8579;">'+esc(t.loadingSub)+'</div>'+
    '</div>';
  }

  function recipeCard(item, t, isEn){
    var r = item.r;
    var miss = item.miss, have = item.have;
    var mn = miss.length===0;
    var badgeText = mn ? t.makeNow : (miss.length===1 ? t.missing1 : (isEn ? ('Missing '+miss.length) : ('Faltan '+miss.length)));
    var badgeStyle = mn
      ? 'background:#1b1917;color:#f4f1ea;border:1px solid #1b1917;'
      : 'background:#fbeae8;color:#b91c1c;border:1px solid #f0c9c4;';
    var timeLabel = r.t + ' ' + t.min;

    var haveChips = have.map(function(c){
      return '<span style="padding:5px 11px;border:1px solid #e4ded2;background:#fff;border-radius:8px;font-size:13px;color:#4a463f;">'+esc(c[state.lang])+'</span>';
    }).join('');
    var needBlock = miss.length>0 ? (
      '<div>'+
        '<div style="font-size:11.5px;font-weight:700;letter-spacing:.12em;color:#b91c1c;text-transform:uppercase;margin-bottom:9px;">'+esc(t.needLabel)+'</div>'+
        '<div style="display:flex;flex-wrap:wrap;gap:7px;max-width:300px;">'+
          miss.map(function(c){return '<span style="padding:5px 11px;border:1px solid #f0c9c4;background:#fbeae8;border-radius:8px;font-size:13px;color:#b91c1c;font-weight:500;">'+esc(c[state.lang])+'</span>';}).join('')+
        '</div>'+
      '</div>'
    ) : '';
    var stepRows = r.steps[state.lang].map(function(st,i){
      return '<div style="display:flex;gap:13px;align-items:flex-start;">'+
        '<span style="flex:none;width:23px;height:23px;border-radius:50%;background:#1b1917;color:#f4f1ea;font-family:\'Newsreader\',serif;font-size:12.5px;font-weight:600;display:flex;align-items:center;justify-content:center;margin-top:1px;">'+(i+1)+'</span>'+
        '<span style="font-size:15px;line-height:1.5;color:#332f29;">'+esc(st)+'</span>'+
      '</div>';
    }).join('');

    return '<div style="background:#fffdf9;border:1px solid #e4ded2;border-radius:18px;padding:26px 28px;animation:fadeUp .35s ease both;">'+
      '<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:6px;">'+
        '<h3 style="font-family:\'Newsreader\',serif;font-weight:600;font-size:25px;line-height:1.12;letter-spacing:-.01em;margin:0;">'+esc(r.name[state.lang])+'</h3>'+
        '<span style="flex:none;padding:6px 13px;border-radius:999px;font-size:12.5px;font-weight:700;letter-spacing:.02em;white-space:nowrap;'+badgeStyle+'">'+esc(badgeText)+'</span>'+
      '</div>'+
      '<div style="font-size:13.5px;color:#8c8579;font-weight:500;margin-bottom:20px;">'+esc(timeLabel)+'</div>'+
      '<div style="display:flex;flex-wrap:wrap;gap:28px;margin-bottom:22px;">'+
        '<div>'+
          '<div style="font-size:11.5px;font-weight:700;letter-spacing:.12em;color:#6e685d;text-transform:uppercase;margin-bottom:9px;">'+esc(t.haveLabel)+'</div>'+
          '<div style="display:flex;flex-wrap:wrap;gap:7px;max-width:340px;">'+haveChips+'</div>'+
        '</div>'+
        needBlock+
      '</div>'+
      '<div style="border-top:1px solid #efe9dd;padding-top:18px;">'+
        '<div style="font-size:11.5px;font-weight:700;letter-spacing:.12em;color:#6e685d;text-transform:uppercase;margin-bottom:13px;">'+esc(t.steps)+'</div>'+
        '<div style="display:flex;flex-direction:column;gap:11px;">'+stepRows+'</div>'+
      '</div>'+
    '</div>';
  }

  function emptyResults(t){
    var sugg = SUGG.filter(function(x){return !isSel(x.key);}).slice(0,3);
    var btns = sugg.map(function(x){
      return '<button type="button" data-act="add" data-key="'+esc(x.key)+'" style="padding:10px 18px;border:1px solid #1b1917;background:#1b1917;color:#f4f1ea;border-radius:999px;font-family:inherit;font-weight:600;font-size:14px;cursor:pointer;">+ '+esc(x[state.lang])+'</button>';
    }).join('');
    return '<div style="background:#fffdf9;border:1px solid #e4ded2;border-radius:18px;padding:40px 34px;text-align:center;">'+
      '<div style="font-family:\'Newsreader\',serif;font-size:26px;font-weight:500;margin-bottom:10px;">'+esc(t.emptyTitle)+'</div>'+
      '<p style="font-size:15px;color:#8c8579;margin:0 0 22px;">'+esc(t.emptySub)+'</p>'+
      '<div style="display:flex;flex-wrap:wrap;gap:9px;justify-content:center;">'+btns+'</div>'+
    '</div>';
  }

  function resultsView(t, isEn){
    var count = state.recipes.length;
    var body = count>0
      ? '<div style="display:flex;flex-direction:column;gap:18px;">'+state.recipes.map(function(it){return recipeCard(it,t,isEn);}).join('')+'</div>'
      : emptyResults(t);
    var sub = count>0 ? ('<div style="font-size:13.5px;color:#8c8579;font-weight:500;margin-top:4px;">'+count+' '+esc(t.countSuffix)+'</div>') : '';
    return '<div style="max-width:740px;margin:0 auto;padding-top:44px;">'+
      '<div style="display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin-bottom:30px;">'+
        '<div>'+
          '<div style="font-size:12px;font-weight:700;letter-spacing:.18em;color:#b91c1c;margin-bottom:10px;">'+esc(t.kicker)+'</div>'+
          '<h1 style="font-family:\'Newsreader\',serif;font-weight:500;font-size:40px;line-height:1.05;letter-spacing:-.02em;margin:0;">'+esc(t.resultsTitle)+'</h1>'+
          sub+
        '</div>'+
        '<button type="button" data-act="reset" style="flex:none;padding:11px 18px;border:1px solid #1b1917;background:none;color:#1b1917;border-radius:999px;font-family:inherit;font-weight:600;font-size:14px;cursor:pointer;">'+esc(t.newSearch)+'</button>'+
      '</div>'+
      body+
    '</div>';
  }

  /* =========================== RENDER ============================ */
  function render(){
    var t = STR[state.lang];
    var isEn = state.lang==='en';
    var content;
    if(state.status==='loading') content = loadingView(t);
    else if(state.status==='results') content = resultsView(t, isEn);
    else content = idleView(t);

    document.getElementById('app').innerHTML =
      '<div style="min-height:100vh;background:#f4f1ea;color:#1b1917;font-family:\'Hanken Grotesk\',system-ui,sans-serif;">'+
        topBar(isEn)+
        '<div class="pad-x" style="padding:0 28px 96px;">'+content+'</div>'+
      '</div>';
  }

  /* ====================== EVENT DELEGATION ======================= */
  document.addEventListener('click', function(e){
    var b = e.target.closest('[data-act]');
    if(!b) return;
    var act = b.getAttribute('data-act');
    var key = b.getAttribute('data-key');
    if(act==='lang') setLang(b.getAttribute('data-lang'));
    else if(act==='toggle'){ var it=itemByKey[key]; if(it) toggle(it); }
    else if(act==='add'){ var it2=itemByKey[key]; if(it2) addItem(it2); }
    else if(act==='remove') remove(key);
    else if(act==='addfree') addFree();
    else if(act==='clear') clearAll();
    else if(act==='find') find();
    else if(act==='reset') reset();
  });
  document.addEventListener('input', function(e){
    if(e.target && e.target.id==='freetext') state.freeText=e.target.value;
  });
  document.addEventListener('keydown', function(e){
    if(e.target && e.target.id==='freetext' && e.key==='Enter'){ e.preventDefault(); addFree(); }
  });

  render();
})();
</script>
</body>
</html>
